#注意：
#双机器人：Left表示机器人1 Right表示机器人2
#单机器人：Left表示平焊参数 Right表示立焊参数
[WeldParam]
strWorkpieceFlat=6.500
strWorkpieceStand=11.000
bEditOrAdd=0
StartPointScanDis=-40.000000

#平焊补偿：水平方向 外加內减 高度方向：上加下减
[WeldCompVal270]             #平焊焊缝方向角270度
FlatWeldHorComp=1.800000
FlatWeldHeightComp=-0.200000

[WeldCompVal90]              #平焊焊缝方向角90度
FlatWeldHorComp=1.500000
FlatWeldHeightComp=0.000000

[WeldCompVal0]               #平焊焊缝方向角0度
FlatWeldHorComp=2.000000
FlatWeldHeightComp=-1.000000

[WeldCompVal180]             #平焊焊缝方向角180度
FlatWeldHorComp=2.000000
FlatWeldHeightComp=0.000000

[WeldCompVal45]              #平焊焊缝方向角45度
FlatWeldHorComp=0.000000
FlatWeldHeightComp=0.000000

[WeldCompVal135]             #平焊焊缝方向角135度
FlatWeldHorComp=0.000000
FlatWeldHeightComp=0.000000

[WeldCompVal225]             #平焊焊缝方向角225度
FlatWeldHorComp=0.000000
FlatWeldHeightComp=0.000000

[WeldCompVal315]             #平焊焊缝方向角315度
FlatWeldHorComp=0.000000
FlatWeldHeightComp=0.000000

[WeldCompValTrack]             #平焊焊缝跟踪
FlatWeldHorComp=0.500000
FlatWeldHeightComp=-0.500000

#立焊补偿: 焊丝方向(干伸长度) 长加短减 焊丝垂直方向(俯视)：逆加顺减
[StandWeldComp315]           #立焊焊缝方向角315度
StandWeldLenComp=-3.000000
StandWeldVerComp=2.500000

[StandWeldComp225]           #立焊焊缝方向角225度
StandWeldLenComp=-3.000000
StandWeldVerComp=2.000000

[StandWeldComp135]           #立焊焊缝方向角135度
StandWeldLenComp=-4.000000
StandWeldVerComp=2.500000

[StandWeldComp45]            #立焊焊缝方向角45度
StandWeldLenComp=-1.500000
StandWeldVerComp=2.500000

[StandWeldComp0]             #立焊焊缝方向角0度
StandWeldLenComp=-8.000000
StandWeldVerComp=-4.000000

[StandWeldComp90]            #立焊焊缝方向角90度
StandWeldLenComp=-8.000000
StandWeldVerComp=1.500000

[StandWeldComp180]           #立焊焊缝方向角180度
StandWeldLenComp=-8.000000
StandWeldVerComp=1.000000

[StandWeldComp270]           #立焊焊缝方向角270度
StandWeldLenComp=-8.000000
StandWeldVerComp=1.000000
[Free0]
HorComp=0.000000
HeightComp=0.000000
[Interfence0]
HorComp=0.000000
HeightComp=0.000000
[Free90]
HorComp=0.000000
HeightComp=0.000000
