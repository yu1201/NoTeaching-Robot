[ExternalAxleFuncation]
#外部轴作用，-1,1,2,3 代表轴为，不使用，EX_X,EX_Y,EX_Z 20250207附加轴组，个位表示轴号，十位表示轴组
#十位：轴组，坐标系单轴最多存在一个外部轴即一个轴组，存在多个外部轴即多个轴组
#各位：轴号，沿用原定义
